<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        h1 {
            color: #1a73e8;
        }
        .status {
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #5f6368;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #fff;
            border: 2px solid #dadce0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .cell:hover {
            background-color: #f8f9fa;
        }
        .cell.x {
            color: #d93025;
        }
        .cell.o {
            color: #1a73e8;
        }
        .cell.taken {
            cursor: not-allowed;
        }
        button {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 1rem;
            color: #fff;
            background-color: #1a73e8;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1765cc;
        }
    </style>
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <div class="status" id="status">Your Turn (X)</div>
    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>
    <button id="reset">Reset Game</button>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const resetBtn = document.getElementById('reset');
        const cells = document.querySelectorAll('.cell');

        let board = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;
        let isAITurn = false;
        const HUMAN = "X";
        const AI = "O";

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // cols
            [0, 4, 8], [2, 4, 6]             // diags
        ];

        function handleCellClick(e) {
            const index = e.target.getAttribute('data-index');
            if (board[index] !== "" || !gameActive || isAITurn) return;

            makeMove(index, HUMAN);
            if (gameActive) {
                isAITurn = true;
                statusElement.innerText = "AI is thinking...";
                setTimeout(aiMove, 500);
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            cells[index].innerText = player;
            cells[index].classList.add(player.toLowerCase(), 'taken');
            checkResult();
        }

        function checkResult() {
            let roundWon = false;
            let winner = null;

            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    winner = board[a];
                    break;
                }
            }

            if (roundWon) {
                statusElement.innerText = winner === HUMAN ? "You Win!" : "AI Wins!";
                gameActive = false;
                isAITurn = false;
                return;
            }

            if (!board.includes("")) {
                statusElement.innerText = "Draw!";
                gameActive = false;
                isAITurn = false;
                return;
            }

            if (gameActive) {
                const nextPlayer = board.filter(x => x!=="").length % 2 === 0 ? HUMAN : AI;
                statusElement.innerText = nextPlayer === HUMAN ? "Your Turn (X)" : "AI's Turn (O)";
            }
        }

        function aiMove() {
            if (!gameActive) {
                isAITurn = false;
                return;
            }
            const bestMove = minimax(board, AI).index;
            makeMove(bestMove, AI);
            isAITurn = false;
        }

        function minimax(newBoard, player) {
            const availSpots = newBoard.map((v, i) => v === "" ? i : null).filter(v => v !== null);

            if (checkWin(newBoard, HUMAN)) return { score: -10 };
            if (checkWin(newBoard, AI)) return { score: 10 };
            if (availSpots.length === 0) return { score: 0 };

            const moves = [];
            for (let i = 0; i < availSpots.length; i++) {
                const move = {};
                move.index = availSpots[i];
                newBoard[availSpots[i]] = player;

                if (player === AI) {
                    move.score = minimax(newBoard, HUMAN).score;
                } else {
                    move.score = minimax(newBoard, AI).score;
                }

                newBoard[availSpots[i]] = "";
                moves.push(move);
            }

            let bestMove;
            if (player === AI) {
                let bestScore = -10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score > bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            } else {
                let bestScore = 10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score < bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            }
            return moves[bestMove];
        }

        function checkWin(b, p) {
            return winConditions.some(c => b[c[0]] === p && b[c[1]] === p && b[c[2]] === p);
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            statusElement.innerText = "Your Turn (X)";
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('x', 'o', 'taken');
            });
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', resetGame);
    </script>
</body>
</html>
