<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #5f6368;
            --title-color: #1a73e8;
            --cell-bg: #fff;
            --cell-border: #dadce0;
            --button-bg: #1a73e8;
            --button-hover: #1765cc;
            --x-color: #d93025;
            --o-color: #1a73e8;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --title-color: #8ab4f8;
            --cell-bg: #1e1e1e;
            --cell-border: #333;
            --button-bg: #8ab4f8;
            --button-hover: #aecbfa;
            --x-color: #f28b82;
            --o-color: #8ab4f8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        h1 {
            color: var(--title-color);
        }
        .status {
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .timer {
            margin-bottom: 10px;
            font-family: monospace;
            font-size: 1rem;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: var(--cell-bg);
            border: 2px solid var(--cell-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .cell:hover {
            opacity: 0.9;
        }
        .cell.x {
            color: var(--x-color);
        }
        .cell.o {
            color: var(--o-color);
        }
        .cell.taken {
            cursor: not-allowed;
        }
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            color: #fff;
            background-color: var(--button-bg);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        body.dark-mode button {
            color: #121212;
            font-weight: bold;
        }
        button:hover {
            background-color: var(--button-hover);
        }
        #toggle-dark {
            background-color: #5f6368;
        }
        #toggle-dark:hover {
            background-color: #4f5358;
        }
    </style>
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <div class="status" id="status">Your Turn (X)</div>
    <div class="timer" id="timer">Time: 0s</div>
    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>
    <div class="controls">
        <button id="reset">Reset Game</button>
        <button id="toggle-dark">Dark Mode</button>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const timerElement = document.getElementById('timer');
        const resetBtn = document.getElementById('reset');
        const darkBtn = document.getElementById('toggle-dark');
        const cells = document.querySelectorAll('.cell');

        let board = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;
        let isAITurn = false;
        let startTime = Date.now();
        let timerInterval;
        const HUMAN = "X";
        const AI = "O";

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // cols
            [0, 4, 8], [2, 4, 6]             // diags
        ];

        function startTimer() {
            clearInterval(timerInterval);
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                timerElement.innerText = `Time: ${elapsed}s`;
            }, 1000);
        }

        function handleCellClick(e) {
            const index = e.target.getAttribute('data-index');
            if (board[index] !== "" || !gameActive || isAITurn) return;

            makeMove(index, HUMAN);
            if (gameActive) {
                isAITurn = true;
                statusElement.innerText = "AI is thinking...";
                setTimeout(aiMove, 500);
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            cells[index].innerText = player;
            cells[index].classList.add(player.toLowerCase(), 'taken');
            checkResult();
        }

        function checkResult() {
            let roundWon = false;
            let winner = null;

            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    winner = board[a];
                    break;
                }
            }

            if (roundWon) {
                clearInterval(timerInterval);
                const finalTime = Math.floor((Date.now() - startTime) / 1000);
                statusElement.innerText = (winner === HUMAN ? "You Win!" : "AI Wins!") + ` (${finalTime}s)`;
                gameActive = false;
                isAITurn = false;
                return;
            }

            if (!board.includes("")) {
                clearInterval(timerInterval);
                const finalTime = Math.floor((Date.now() - startTime) / 1000);
                statusElement.innerText = `Draw! (${finalTime}s)`;
                gameActive = false;
                isAITurn = false;
                return;
            }

            if (gameActive) {
                const nextPlayer = board.filter(x => x!=="").length % 2 === 0 ? HUMAN : AI;
                statusElement.innerText = nextPlayer === HUMAN ? "Your Turn (X)" : "AI's Turn (O)";
            }
        }

        function aiMove() {
            if (!gameActive) {
                isAITurn = false;
                return;
            }
            const bestMove = minimax(board, AI).index;
            makeMove(bestMove, AI);
            isAITurn = false;
        }

        function minimax(newBoard, player) {
            const availSpots = newBoard.map((v, i) => v === "" ? i : null).filter(v => v !== null);

            if (checkWin(newBoard, HUMAN)) return { score: -10 };
            if (checkWin(newBoard, AI)) return { score: 10 };
            if (availSpots.length === 0) return { score: 0 };

            const moves = [];
            for (let i = 0; i < availSpots.length; i++) {
                const move = {};
                move.index = availSpots[i];
                newBoard[availSpots[i]] = player;

                if (player === AI) {
                    move.score = minimax(newBoard, HUMAN).score;
                } else {
                    move.score = minimax(newBoard, AI).score;
                }

                newBoard[availSpots[i]] = "";
                moves.push(move);
            }

            let bestMove;
            if (player === AI) {
                let bestScore = -10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score > bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            } else {
                let bestScore = 10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score < bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            }
            return moves[bestMove];
        }

        function checkWin(b, p) {
            return winConditions.some(c => b[c[0]] === p && b[c[1]] === p && b[c[2]] === p);
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            statusElement.innerText = "Your Turn (X)";
            timerElement.innerText = "Time: 0s";
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('x', 'o', 'taken');
            });
            startTimer();
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', resetGame);
        darkBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            darkBtn.innerText = document.body.classList.contains('dark-mode') ? 'Light Mode' : 'Dark Mode';
        });

        // Initialize timer
        startTimer();
    </script>
</body>
</html>
